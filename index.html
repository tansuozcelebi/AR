<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="portrait" />
  <meta name="theme-color" content="#0f0f19" />
  <title>AR 3D Yerleştirme</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --glass-bg: rgba(15, 15, 25, 0.75);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-highlight: rgba(255, 255, 255, 0.06);
      --accent: #6C63FF;
      --accent-glow: rgba(108, 99, 255, 0.4);
      --success: #00E676;
      --warning: #FFD740;
      --danger: #FF5252;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.65);
      --text-muted: rgba(255, 255, 255, 0.35);
      --panel-radius: 20px;
      --btn-radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      color: var(--text-primary);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #camera-feed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      display: none;
      background: #000;
    }

    #ar-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ---- UI OVERLAY ---- */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #ui-overlay > * {
      pointer-events: auto;
    }

    /* ---- TOP STATUS BAR ---- */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
    }

    #status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #status-indicator.detected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    #status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      flex: 1;
    }

    #object-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--glass-bg);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
    }

    .top-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s;
    }

    .top-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ---- CENTER CONTENT ---- */
    #center-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* ---- AR START SCREEN ---- */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      pointer-events: auto;
      text-align: center;
      padding: 20px;
    }

    #start-screen h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #6C63FF, #48C6EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #start-screen p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 280px;
      line-height: 1.5;
    }

    #ar-start-btn {
      padding: 16px 48px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #6C63FF, #5A52E0);
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 32px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }

    #ar-start-btn:active {
      transform: scale(0.95);
    }

    #ar-start-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #fallback-btn {
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      background: var(--glass-bg);
      color: var(--text-secondary);
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .start-hidden {
      display: none !important;
    }

    /* ---- CONTROLS PANEL (mid-right) ---- */
    #controls-panel {
      position: fixed;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 15;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #controls-panel.visible {
      opacity: 1;
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .ctrl-btn:active {
      background: rgba(108, 99, 255, 0.3);
      border-color: var(--accent);
    }

    .ctrl-btn.active {
      background: rgba(108, 99, 255, 0.25);
      border-color: var(--accent);
      color: var(--accent);
    }

    .ctrl-btn.danger:active {
      background: rgba(255, 82, 82, 0.3);
      border-color: var(--danger);
    }

    /* ---- SCALE SLIDER POPUP ---- */
    #scale-popup {
      position: fixed;
      right: 64px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      z-index: 16;
      display: none;
      min-width: 200px;
    }

    #scale-popup.visible {
      display: block;
    }

    #scale-popup label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    #scale-popup input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }

    #scale-popup input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid white;
    }

    #scale-value {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      margin-top: 6px;
      color: var(--accent);
    }

    /* ---- BOTTOM TOOLBAR ---- */
    #bottom-toolbar {
      padding: 0 0 calc(8px + var(--safe-bottom)) 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      padding-top: 40px;
    }

    /* Category tabs */
    #category-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      margin-bottom: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #category-tabs::-webkit-scrollbar {
      display: none;
    }

    .cat-tab {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s;
    }

    .cat-tab.active {
      background: rgba(108, 99, 255, 0.25);
      border-color: var(--accent);
      color: var(--text-primary);
    }

    /* Object thumbnails */
    #object-carousel {
      display: flex;
      gap: 10px;
      padding: 8px 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #object-carousel::-webkit-scrollbar {
      display: none;
    }

    .obj-thumb {
      flex-shrink: 0;
      width: 68px;
      height: 80px;
      border-radius: 16px;
      border: 2px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      scroll-snap-align: start;
      transition: all 0.2s;
    }

    .obj-thumb:active,
    .obj-thumb.selected {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.2);
      transform: scale(0.95);
    }

    .obj-thumb-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .obj-thumb-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.1;
    }

    /* ---- SETTINGS PANEL ---- */
    #settings-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      border-radius: var(--panel-radius) var(--panel-radius) 0 0;
      padding: 24px 20px calc(20px + var(--safe-bottom));
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #settings-panel.open {
      transform: translateY(0);
    }

    .settings-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .setting-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Toggle switch */
    .toggle {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.15);
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
      border: none;
    }

    .toggle.on {
      background: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.3s;
    }

    .toggle.on::after {
      transform: translateX(20px);
    }

    /* ---- MEASUREMENT OVERLAY ---- */
    #measurement-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* ---- CONTEXT MENU ---- */
    #context-menu {
      position: fixed;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 6px;
      z-index: 25;
      display: none;
      min-width: 160px;
    }

    #context-menu.visible {
      display: block;
    }

    .ctx-item {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      transition: background 0.15s;
    }

    .ctx-item:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .ctx-item.danger {
      color: var(--danger);
    }

    /* ---- TOAST ---- */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text-primary);
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- CROSSHAIR ---- */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 4;
      opacity: 0.4;
      display: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 1px;
    }

    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      width: 100%;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ---- INFO HINT ---- */
    #info-hint {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.5s;
      max-width: 260px;
      line-height: 1.4;
    }

    #info-hint.visible {
      opacity: 1;
    }

    /* ---- SCREENSHOT FLASH ---- */
    #screenshot-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }

    #screenshot-flash.flash {
      opacity: 0.7;
    }

    /* ---- LOADING SPINNER ---- */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ---- UNDO BAR ---- */
    #undo-bar {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 20;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #undo-bar.visible {
      opacity: 1;
    }

    .undo-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .undo-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }

    .undo-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- Camera passthrough feed (non-WebXR devices) -->
  <video id="camera-feed" playsinline autoplay muted></video>

  <!-- Three.js Canvas -->
  <canvas id="ar-canvas"></canvas>

  <!-- Screenshot Flash -->
  <div id="screenshot-flash"></div>

  <!-- Measurement Overlay -->
  <svg id="measurement-overlay"></svg>

  <!-- Crosshair -->
  <div id="crosshair"></div>

  <!-- Info Hint -->
  <div id="info-hint"></div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" data-action="duplicate">&#x2398; Kopyala</div>
    <div class="ctx-item" data-action="info">&#x2139; Bilgi</div>
    <div class="ctx-item" data-action="animation-toggle">&#x25B6; Animasyon</div>
    <div class="ctx-item danger" data-action="delete">&#x2716; Sil</div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <!-- Top Status Bar -->
    <div id="status-bar">
      <div id="status-indicator"></div>
      <span id="status-text">AR başlatılıyor...</span>
      <span id="object-count">0 nesne</span>
      <button class="top-btn" id="btn-settings" title="Ayarlar">&#x2699;</button>
      <button class="top-btn" id="btn-screenshot" title="Ekran Görüntüsü">&#x1F4F7;</button>
    </div>

    <!-- Center -->
    <div id="center-area">
      <div id="start-screen">
        <h1>AR 3D Yerleştirme</h1>
        <p>Gerçek dünyaya 3D nesneler yerleştirin. Yüzeyleri tarayın, nesneleri seçin ve yerleştirin.</p>
        <button id="ar-start-btn">Kamerayı Başlat</button>
        <button id="fallback-btn">3D Önizleme Modu</button>
        <p id="ar-mode-note" style="font-size:12px;opacity:0.6;margin-top:-8px;"></p>
      </div>
    </div>

    <!-- Bottom Toolbar -->
    <div id="bottom-toolbar" class="start-hidden">
      <!-- Category Tabs -->
      <div id="category-tabs">
        <button class="cat-tab active" data-category="all">Tümü</button>
        <button class="cat-tab" data-category="Mobilya">Mobilya</button>
        <button class="cat-tab" data-category="Dekorasyon">Dekorasyon</button>
        <button class="cat-tab" data-category="Doga">Doğa</button>
        <button class="cat-tab" data-category="Teknoloji">Teknoloji</button>
      </div>
      <!-- Object Carousel -->
      <div id="object-carousel">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Controls Panel (right side) -->
  <div id="controls-panel">
    <button class="ctrl-btn" id="btn-scale" title="Ölçekle">&#x21F3;</button>
    <button class="ctrl-btn" id="btn-rotate-left" title="Sola Döndür">&#x21BA;</button>
    <button class="ctrl-btn" id="btn-rotate-right" title="Sağa Döndür">&#x21BB;</button>
    <button class="ctrl-btn" id="btn-animation" title="Animasyon">&#x25B6;</button>
    <button class="ctrl-btn" id="btn-measure" title="Ölçüm">&#x1F4CF;</button>
    <button class="ctrl-btn danger" id="btn-delete" title="Sil">&#x2716;</button>
  </div>

  <!-- Scale Popup -->
  <div id="scale-popup">
    <label>Ölçek Oranı</label>
    <input type="range" id="scale-slider" min="10" max="300" value="100" step="5" />
    <div id="scale-value">%100</div>
  </div>

  <!-- Undo Bar -->
  <div id="undo-bar">
    <button class="undo-btn" id="btn-undo" disabled>&#x21A9; Geri Al</button>
    <button class="undo-btn" id="btn-redo" disabled>&#x21AA; Yinele</button>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div class="settings-title">
      <span>Ayarlar</span>
      <button class="settings-close" id="settings-close">&#x2715;</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Izgara Yakalama</span>
      <button class="toggle" id="toggle-grid" data-setting="gridSnap"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Gölgeler</span>
      <button class="toggle on" id="toggle-shadows" data-setting="shadows"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Ölçümler</span>
      <button class="toggle" id="toggle-measurements" data-setting="measurements"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Animasyonlar</span>
      <button class="toggle on" id="toggle-animations" data-setting="animations"></button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
